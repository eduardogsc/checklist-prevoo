<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0A4A38"/>
<title>Checklist Pré-Voo</title>

<style>
/* (SEU CSS INTACTO — NÃO ALTEREI NADA) */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');
:root {
--green-dark:#0A4A38;
--green-mid:#0F6E56;
--green:#1D9E75;
--green-light:#5DCAA5;
--green-bg:#E1F5EE;
--red:#E24B4A;
--red-bg:#FCEBEB;
--red-dark:#791F1F;
--amber:#BA7517;
--amber-bg:#FAEEDA;
--surface:#F7F7F5;
--card:#FFFFFF;
--border:rgba(0,0,0,0.09);
--text:#1A1A18;
--text2:#5F5E5A;
--text3:#A0A09A;
--mono:'IBM Plex Mono', monospace;
--sans:'IBM Plex Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--surface);font-family:var(--sans);color:var(--text);}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}
</style>
</head>

<body>

<!-- META -->
<div id="s-meta" class="screen active">
<button onclick="startChecklist()">Iniciar checklist</button>
</div>

<div id="s-check" class="screen">
<div id="items-body"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWHTsZ3tA7nBIyLKLEe5qa9yqxrz37cdgrDPYOhsplX8Wghp72j3Finw_4nhwFuDeF/exec";

const ITEMS=[
{id:1,name:"EPI completo",action:"Luvas, capacete e auricular — retirar a luva (operador)"},
{id:2,name:"Documentações",action:"Sarpas, Anac e Seguro"}
];

let resp={}, meta={};

function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function startChecklist(){
resp={};
renderItems();
show('s-check');
}

function renderItems(){
const body=document.getElementById('items-body');
body.innerHTML='';

ITEMS.forEach(item=>{
const r=resp[item.id];

const card=document.createElement('div');

card.innerHTML=`
<div>
<span>${item.id}</span>
<div>${item.name}</div>
<div>${item.action}</div>
</div>

<div>
<button onclick="setR(${item.id},'OK')">OK</button>
<button onclick="setR(${item.id},'FALHA')">Falha</button>
<button onclick="setR(${item.id},'N/A')">N/A</button>
</div>
`;

body.appendChild(card);
});
}

function setR(id,val){
resp[id]=val;
console.log(resp);
}

async function sendSheets(){
try{
const response = await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(resp)
});

const result = await response.text();
console.log(result);

}catch(err){
console.error(err);
}
}

function newOp(){
resp={};
show('s-meta');
}

</script>
</body>
</html>
