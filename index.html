<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<title>Checklist Pré-Voo</title>

<style>

</style>
</head>

<body>

<!-- TODO: TODO seu HTML original aqui sem alteração nenhuma -->

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWHTsZ3tA7nBIyLKLEe5qa9yqxrz37cdgrDPYOhsplX8Wghp72j3Finw_4nhwFuDeF/exec";

const ITEMS=[
  {id:1,name:"EPI completo",action:"Luvas, capacete e auricular — retirar a luva (operador)"},
  {id:2,name:"Documentações",action:"Sarpas, Anac e Seguro"},
  {id:3,name:"Vento",action:"Verificar condições de vento"},
  {id:4,name:"Balanço (Pitch/Roll)",action:"Verificar balanço da aeronave"},
  {id:5,name:"Índice KP < 3",action:"Verificar interferência geomagnética"},
  {id:6,name:"Corpo da aeronave",action:"Limpo, seco e sem danos"},
  {id:7,name:"Braços (rotor arms)",action:"Desdobrar e destravar com segurança"},
  {id:8,name:"Hélices",action:"Verificar danos ou parafusos soltos"},
  {id:9,name:"Câmera",action:"Destravar antes de ligar o RPA/UAS"},
  {id:10,name:"Baterias do UAS",action:"Acima de 80%, sem danos ou inchaço, travas OK"},
  {id:11,name:"Bateria do RC",action:"Instalar bateria auxiliar e verificar carga"},
  {id:12,name:"Antena do RC",action:"Desdobrar na posição ideal"},
  {id:13,name:"Controle remoto",action:"Ligar e aguardar inicialização do sistema"},
  {id:14,name:"UAS / RPA",action:"Ligar e aguardar inicialização do sistema"},
  {id:15,name:"Luzes LED / Alarmes",action:"Verificar se estão normais"},
  {id:16,name:"Status bateria UAS",action:"Temperatura, equilíbrio celular e potência suficiente"},
  {id:17,name:"Status bateria RC",action:"Potência suficiente + contingência"},
  {id:18,name:"Altitude RTH",action:"Definir conforme o ambiente"},
  {id:19,name:"Fora de controle / C2",action:"Configurar Return to Home (RTH)"},
  {id:20,name:"Cerca geográfica",action:"Definir distância e altura máximas"},
  {id:21,name:"Home point",action:"Selecionar e verificar no mapa"},
  {id:22,name:"Avisos de bateria",action:"35% baixo / 25% crítico"},
  {id:23,name:"GNSS / Satélite",action:"Acima de 10 satélites"},
  {id:24,name:"Sinal do RC",action:"Sinal bom/forte"},
  {id:25,name:"Mapa",action:"Verificar mapa, home point e posição do UAS"},
  {id:26,name:"SD Card",action:"Verificar capacidade; formatar se possível"},
  {id:27,name:"Modo de controle",action:"Sempre no Modo 2"},
  {id:28,name:"Modo de voo",action:"Modo padrão selecionado"},
  {id:29,name:"Câmera (modo)",action:"Verificar câmera no modo automático"},
  {id:30,name:"Função Timestamp",action:"Telemetria: data, coordenada e texto"},
  {id:31,name:"Função CWZI",action:"Todas as funções selecionadas"},
  {id:32,name:"GO / NO GO",action:"Decisão do piloto — o sistema UAS é seguro para voar?"}
];

let resp={}, meta={};

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function setDefaults(){
  const n=new Date();
  document.getElementById('m-data').value=n.toISOString().split('T')[0];
  document.getElementById('m-hora').value=n.toTimeString().slice(0,5);
}

function startChecklist(){
  meta={
    data:document.getElementById('m-data').value,
    hora:document.getElementById('m-hora').value,
    op:document.getElementById('m-op').value||'Não informado',
    aero:document.getElementById('m-aero').value||'Não informado'
  };
  resp={};
  renderItems();
  show('s-check');
}

function renderItems(){
  const body=document.getElementById('items-body');
  body.innerHTML='';
  ITEMS.forEach(item=>{
    const r=resp[item.id];
    const cls=r==='OK'?'ok':r==='FALHA'?'fail':r==='N/A'?'na':'';
    const card=document.createElement('div');
    card.className='item-card '+cls;
    card.id='card-'+item.id;
    card.innerHTML=`
      <div class="item-head">
        <span class="item-num">${item.id}</span>
        <div class="item-texts">
          <div class="item-name">${item.name}</div>
          <div class="item-action">${item.action}</div>
        </div>
        ${r?`<span class="item-badge badge-${r==='OK'?'ok':r==='FALHA'?'fail':'na'}">${r}</span>`:''}
      </div>
      <div class="tap-row">
        <button class="tap-btn${r==='OK'?' t-ok':''}" onclick="setR(${item.id},'OK')">OK</button>
        <button class="tap-btn${r==='FALHA'?' t-fail':''}" onclick="setR(${item.id},'FALHA')">Falha</button>
        <button class="tap-btn${r==='N/A'?' t-na':''}" onclick="setR(${item.id},'N/A')">N/A</button>
      </div>`;
    body.appendChild(card);
  });
  updateProg();
}

function setR(id,val){
  resp[id]=val;
  renderItems(); // 🔥 correção crítica (evita bug de DOM quebrado)
}

function updateProg(){
  const done=Object.keys(resp).length;
  document.getElementById('ck-prog-txt').textContent=done+' / 32';
  document.getElementById('ck-sub').textContent=done+' de 32 itens respondidos';
  document.getElementById('ck-prog-fill').style.width=Math.round(done/32*100)+'%';
}

async function sendSheets(){
  const btn=document.getElementById('send-btn');
  btn.textContent='Enviando...';
  btn.disabled=true;

  try{
    await fetch(SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({meta,resp})
    });
    show('s-done');
  }catch(err){
    btn.textContent='Enviar para Google Sheets';
    btn.disabled=false;
    alert('Erro ao enviar.');
  }
}

function newOp(){ resp={}; meta={}; setDefaults(); show('s-meta'); }

setDefaults();
</script>

</body>
</html>
