<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0A4A38"/>
<title>Checklist Pré-Voo</title>

<style>
/* (SEU CSS INTEIRO — NÃO ALTEREI NADA) */
</style>

</head>
<body>

<!-- TODO SEU HTML (NÃO ALTEREI NADA) -->

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWHTsZ3tA7nBIyLKLEe5qa9yqxrz37cdgrDPYOhsplX8Wghp72j3Finw_4nhwFuDeF/exec";

const ITEMS=[/* (SEU ARRAY INTEIRO — NÃO ALTEREI NADA) */];

let resp={}, meta={};

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function setDefaults(){
  const dataInput = document.getElementById('m-data');
  const horaInput = document.getElementById('m-hora');

  if(!dataInput || !horaInput) return; // 🔥 evita crash

  const n=new Date();
  dataInput.value=n.toISOString().split('T')[0];
  horaInput.value=n.toTimeString().slice(0,5);
}

function startChecklist(){
  meta={
    data:document.getElementById('m-data').value,
    hora:document.getElementById('m-hora').value,
    op:document.getElementById('m-op').value||'Não informado',
    aero:document.getElementById('m-aero').value||'Não informado'
  };
  resp={};
  renderItems();
  show('s-check');
}

function renderItems(){
  const body=document.getElementById('items-body');
  body.innerHTML='';
  ITEMS.forEach(item=>{
    const r=resp[item.id];
    const cls=r==='OK'?'ok':r==='FALHA'?'fail':r==='N/A'?'na':'';
    const card=document.createElement('div');
    card.className='item-card '+cls;
    card.id='card-'+item.id;
    card.innerHTML=`
      <div class="item-head">
        <span class="item-num">${item.id}</span>
        <div class="item-texts">
          <div class="item-name">${item.name}</div>
          <div class="item-action">${item.action}</div>
        </div>
        ${r?`<span class="item-badge badge-${r==='OK'?'ok':r==='FALHA'?'fail':'na'}">${r}</span>`:''}
      </div>
      <div class="tap-row">
        <button class="tap-btn${r==='OK'?' t-ok':''}" onclick="setR(${item.id},'OK')">OK</button>
        <button class="tap-btn${r==='FALHA'?' t-fail':''}" onclick="setR(${item.id},'FALHA')">Falha</button>
        <button class="tap-btn${r==='N/A'?' t-na':''}" onclick="setR(${item.id},'N/A')">N/A</button>
      </div>`;
    body.appendChild(card);
  });
  updateProg();
}

function setR(id,val){
  resp[id]=val;
  const item=ITEMS[id-1];
  const cls=val==='OK'?'ok':val==='FALHA'?'fail':'na';
  const card=document.getElementById('card-'+id);
  card.className='item-card '+cls;
  card.querySelector('.item-head').innerHTML=`
    <span class="item-num">${id}</span>
    <div class="item-texts">
      <div class="item-name">${item.name}</div>
      <div class="item-action">${item.action}</div>
    </div>
    <span class="item-badge badge-${val==='OK'?'ok':val==='FALHA'?'fail':'na'}">${val}</span>`;
  const btns=card.querySelectorAll('.tap-btn');
  btns[0].className='tap-btn'+(val==='OK'?' t-ok':'');
  btns[1].className='tap-btn'+(val==='FALHA'?' t-fail':'');
  btns[2].className='tap-btn'+(val==='N/A'?' t-na':'');
  updateProg();
}

function updateProg(){
  const done=Object.keys(resp).length;
  document.getElementById('ck-prog-txt').textContent=done+' / 32';
  document.getElementById('ck-sub').textContent=done+' de 32 itens respondidos';
  document.getElementById('ck-prog-fill').style.width=Math.round(done/32*100)+'%';
}

function goReview(){
  const ok=Object.values(resp).filter(v=>v==='OK').length;
  const fail=Object.values(resp).filter(v=>v==='FALHA').length;
  const na=Object.values(resp).filter(v=>v==='N/A').length;
  const pend=32-Object.keys(resp).length;
  const gg=fail>0?'NO GO':pend>0?'PENDENTE':'GO';

  document.getElementById('rv-meta').textContent=meta.data+' · '+meta.hora+' · '+meta.op;

  document.getElementById('rv-stats').innerHTML=`
    <div class="stat-box"><div class="stat-val" style="color:var(--green)">${ok}</div><div class="stat-lbl">OK</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--red)">${fail}</div><div class="stat-lbl">Falha</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--text2)">${pend}</div><div class="stat-lbl">Pendentes</div></div>`;

  const ggcls=gg==='GO'?'go':gg==='NO GO'?'nogo':'pend';
  const ggsub=gg==='GO'?'Sistema seguro para voar':gg==='NO GO'?'Corrija as falhas antes de voar':'Itens sem resposta — revise o checklist';

  document.getElementById('rv-gonogo').innerHTML=
    `<div class="gonogo ${ggcls}">
      <div class="gonogo-label">${gg}</div>
      <div class="gonogo-sub">${ggsub}</div>
    </div>`;

  const fails=ITEMS.filter(i=>resp[i.id]==='FALHA');

  document.getElementById('rv-fails').innerHTML=fails.length?
    `<div class="fail-list">
      <div class="fail-list-title">Itens com falha</div>
      ${fails.map(f=>`<div class="fail-item">#${f.id} — ${f.name}</div>`).join('')}
    </div>`:'';

  show('s-review');
}

async function sendSheets(){
  const ok=Object.values(resp).filter(v=>v==='OK').length;
  const fail=Object.values(resp).filter(v=>v==='FALHA').length;
  const na=Object.values(resp).filter(v=>v==='N/A').length;
  const gg=fail>0?'NO GO':(32-Object.keys(resp).length)>0?'PENDENTE':'GO';

  const itens={};
  ITEMS.forEach(i=>{ itens['i'+i.id]=resp[i.id]||'PENDENTE'; });

  const payload={data:meta.data,hora:meta.hora,operador:meta.op,aeronave:meta.aero,gonogo:gg,itens,ok,fail,na};

  const btn=document.getElementById('send-btn');
  btn.textContent='Enviando...'; btn.disabled=true;

  try{
    await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload),mode:'no-cors'});
    show('s-done');
  }catch(err){
    btn.textContent='Enviar para Google Sheets';
    btn.disabled=false;
    alert('Erro ao enviar. Verifique sua conexão com a internet.');
  }
}

function newOp(){
  resp={};
  meta={};
  setDefaults();
  show('s-meta');
}

/* 🔥 CORREÇÃO PRINCIPAL */
document.addEventListener('DOMContentLoaded', () => {
  setDefaults();
});

</script>
</body>
</html>
