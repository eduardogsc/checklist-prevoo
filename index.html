<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Checklist Pré-Voo</title>

<style>
body { font-family: Arial; margin:0; }
.screen { display:none; }
.screen.active { display:block; padding:20px; }
button { padding:10px; margin:5px 0; width:100%; }
.item-card { border:1px solid #ccc; padding:10px; margin-bottom:8px; }
.ok { background:#d4edda; }
.fail { background:#f8d7da; }
.na { background:#eee; }
</style>
</head>

<body>

<div id="s-meta" class="screen active">
  <h2>Checklist Pré-Voo</h2>
  <input type="date" id="m-data"><br>
  <input type="time" id="m-hora"><br>
  <input type="text" id="m-op" placeholder="Operador"><br>
  <input type="text" id="m-aero" placeholder="Aeronave"><br>
  <button onclick="startChecklist()">Iniciar checklist</button>
</div>

<div id="s-check" class="screen">
  <h2>Checklist</h2>
  <div id="items-body"></div>
  <button onclick="goReview()">Revisar</button>
</div>

<div id="s-review" class="screen">
  <h2>Resumo</h2>
  <div id="rv-meta"></div>
  <div id="rv-stats"></div>
  <div id="rv-gonogo"></div>
  <div id="rv-fails"></div>
  <button onclick="sendSheets()">Enviar</button>
</div>

<div id="s-done" class="screen">
  <h2>Enviado com sucesso</h2>
  <button onclick="newOp()">Nova operação</button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWHTsZ3tA7nBIyLKLEe5qa9yqxrz37cdgrDPYOhsplX8Wghp72j3Finw_4nhwFuDeF/exec";

const ITEMS=[
  {id:1,name:"EPI completo",action:"Verificar"},
  {id:2,name:"Documentações",action:"Verificar"},
  {id:3,name:"Vento",action:"Verificar"},
  {id:4,name:"Balanço",action:"Verificar"}
];

let resp={}, meta={};

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setDefaults(){
  const n=new Date();
  document.getElementById('m-data').value=n.toISOString().split('T')[0];
  document.getElementById('m-hora').value=n.toTimeString().slice(0,5);
}

function startChecklist(){
  meta={
    data:document.getElementById('m-data').value,
    hora:document.getElementById('m-hora').value,
    op:document.getElementById('m-op').value,
    aero:document.getElementById('m-aero').value
  };
  resp={};
  renderItems();
  show('s-check');
}

function renderItems(){
  const body=document.getElementById('items-body');
  body.innerHTML='';

  ITEMS.forEach(item=>{
    const r=resp[item.id];
    const cls=r==='OK'?'ok':r==='FALHA'?'fail':'na';

    const card=document.createElement('div');
    card.className='item-card '+cls;
    card.id='card-'+item.id;

    card.innerHTML = `
      <strong>${item.id} - ${item.name}</strong><br>
      <small>${item.action}</small><br>

      <button onclick="setR(${item.id},'OK')">OK</button>
      <button onclick="setR(${item.id},'FALHA')">Falha</button>
      <button onclick="setR(${item.id},'N/A')">N/A</button>
    `;

    body.appendChild(card);
  });
}

function setR(id,val){
  resp[id]=val;
  renderItems();
}

function goReview(){
  const ok=Object.values(resp).filter(v=>v==='OK').length;
  const fail=Object.values(resp).filter(v=>v==='FALHA').length;
  const pend=ITEMS.length-Object.keys(resp).length;

  const gg=fail>0?'NO GO':pend>0?'PENDENTE':'GO';

  document.getElementById('rv-meta').textContent=
    meta.data+' '+meta.hora+' '+meta.op;

  document.getElementById('rv-stats').innerHTML = `
    OK: ${ok} <br>
    Falha: ${fail} <br>
    Pendentes: ${pend}
  `;

  document.getElementById('rv-gonogo').innerHTML = `
    <h3>${gg}</h3>
  `;

  const fails=ITEMS.filter(i=>resp[i.id]==='FALHA');

  document.getElementById('rv-fails').innerHTML =
    fails.length
      ? fails.map(f => `
          <div>#${f.id} ${f.name}</div>
        `).join('')
      : '';

  show('s-review');
}

async function sendSheets(){
  try{
    await fetch(SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({meta,resp})
    });

    show('s-done');

  }catch(e){
    alert('Erro ao enviar');
  }
}

function newOp(){
  resp={};
  meta={};
  setDefaults();
  show('s-meta');
}

setDefaults();
</script>

</body>
</html>
