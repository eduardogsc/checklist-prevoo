<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checklist Pré-Voo</title>
</head>

<body>

<div>
  <h2>Checklist Pré-Voo</h2>

  <input type="date" id="m-data"><br><br>
  <input type="time" id="m-hora"><br><br>
  <input type="text" id="m-op" placeholder="Operador"><br><br>
  <input type="text" id="m-aero" placeholder="Aeronave"><br><br>

  <button onclick="startChecklist()">Iniciar checklist</button>
</div>

<div id="checklist" style="display:none;">
  <h3>Itens</h3>
  <div id="items"></div>
  <button onclick="sendSheets()">Enviar</button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWHTsZ3tA7nBIyLKLEe5qa9yqxrz37cdgrDPYOhsplX8Wghp72j3Finw_4nhwFuDeF/exec";

const ITEMS = Array.from({length:32}, (_,i)=>({
  id:i+1,
  name:"Item "+(i+1)
}));

let resp = {};
let meta = {};

function startChecklist(){
  meta = {
    data:document.getElementById('m-data').value,
    hora:document.getElementById('m-hora').value,
    op:document.getElementById('m-op').value,
    aero:document.getElementById('m-aero').value
  };

  document.querySelector('div').style.display='none';
  document.getElementById('checklist').style.display='block';

  renderItems();
}

function renderItems(){
  const div = document.getElementById('items');
  div.innerHTML = '';

  ITEMS.forEach(item=>{
    const el = document.createElement('div');
    el.innerHTML = `
      <p>${item.name}</p>
      <button onclick="setR(${item.id},'OK')">OK</button>
      <button onclick="setR(${item.id},'FALHA')">Falha</button>
      <button onclick="setR(${item.id},'N/A')">N/A</button>
      <hr>
    `;
    div.appendChild(el);
  });
}

function setR(id,val){
  resp[id] = val;
}

async function sendSheets(){

  const ok = Object.values(resp).filter(v=>v==='OK').length;
  const fail = Object.values(resp).filter(v=>v==='FALHA').length;
  const na = Object.values(resp).filter(v=>v==='N/A').length;

  const gg = fail>0 ? 'NO GO' : 'GO';

  const itens = {};
  ITEMS.forEach(i=>{
    itens['i'+i.id] = resp[i.id] || 'PENDENTE';
  });

  const payload = {
    data:meta.data,
    hora:meta.hora,
    operador:meta.op,
    aeronave:meta.aero,
    gonogo:gg,
    itens,
    ok,
    fail,
    na
  };

  try{
    await fetch(SCRIPT_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify(payload)
    });

    alert("Enviado com sucesso!");

  }catch(err){
    console.error(err);
    alert("Erro ao enviar");
  }
}

function setDefaults(){
  const n=new Date();
  document.getElementById('m-data').value=n.toISOString().split('T')[0];
  document.getElementById('m-hora').value=n.toTimeString().slice(0,5);
}

setDefaults();
</script>

</body>
</html>
